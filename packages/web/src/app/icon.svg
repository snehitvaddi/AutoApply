<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- "AL" text -->
  <text x="256" y="300" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="220" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">AL</text>
  <!-- Subtle arrow/loop at bottom -->
  <path d="M180 380 Q256 420 332 380" stroke="rgba(255,255,255,0.4)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M322 375 L332 380 L325 390" stroke="rgba(255,255,255,0.4)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
